name: Create Release
run-name: Create Release ${{github.ref_name}}

on: 
  workflow_dispatch:
    inputs:
      vintage_story_version:
        description: 'Semantic Vintage Story Version'
        required: true
      additional_version_label:
        description: 'Additional version label to distinguish the release (e.g. "-beta", "-alpha", "-rc1")'
        default: ''
        required: false
      release_description: 
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Containerized Build
        uses: darkluke1111/vsmb@main
        with: 
          vs_version: ${{ github.event.inputs.vintage_story_version }}

      - name: Rename artifact
        run:  mv ${{ github.workspace }}/${{env.RESULT}} ${{github.workspace}}/Releases/TerraPrety_${{env.MOD_VERSION}}${{ github.event.inputs.additional_version_label }}.zip

      - name: release
        uses: ncipollo/release-action@v1
        id: create_release
        with:
          draft: false
          prerelease: false
          tag: v${{env.MOD_VERSION}}${{ github.event.inputs.additional_version_label }}
          commit: ${{ github.sha }}
          body: ${{ github.event.inputs.release_description }}
          artifacts: ${{github.workspace}}/Releases/TerraPrety_${{env.MOD_VERSION}}${{ github.event.inputs.additional_version_label }}.zip
          artifactContentType: application/zip